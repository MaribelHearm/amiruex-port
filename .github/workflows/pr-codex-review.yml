name: PR Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Generate Codex review markdown
        shell: bash
        run: |
          cat > review.md <<'EOF'
          <!-- codex-review-bot -->
          ## 🤖 Codex 自动审查

          Ciallo～(∠・ω< )⌒☆

          > 说明：本评论由 GitHub Actions 自动生成。
          EOF

      - name: Upsert PR review comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY_PATH: review.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const body = fs.readFileSync(process.env.REVIEW_BODY_PATH, 'utf8')
            const marker = '<!-- codex-review-bot -->'
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const botComment = comments.find((c) =>
              c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker),
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

name: PR Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR diff
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --unified=1 --no-color "origin/${{ github.base_ref }}...HEAD" > pr.diff
          head -c 120000 pr.diff > pr-trimmed.diff || true

      - name: Endpoint preflight diagnostics
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
        run: |
          set +e
          BASE_URL="${OPENAI_BASE_URL:-https://api.openai.com/v1}"
          MODEL="${OPENAI_REVIEW_MODEL:-gpt-4.1-mini}"
          ALT_BASE_URL="${BASE_URL%/v1}"
          echo "[diag] base_url=$BASE_URL"
          echo "[diag] alt_base_url=$ALT_BASE_URL"
          echo "[diag] model=$MODEL"

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "[diag] OPENAI_API_KEY is empty"
            exit 0
          fi

          HTTP_CODE=$(curl -sS -o /tmp/openai_models_resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            "$BASE_URL/models")
          echo "[diag] GET $BASE_URL/models -> HTTP $HTTP_CODE"
          echo "[diag] response preview:"
          head -c 280 /tmp/openai_models_resp.txt || true
          echo

          CHAT_BODY=$(printf '{"model":"%s","messages":[{"role":"user","content":"healthcheck"}],"temperature":0}' "$MODEL")

          CHAT_CODE_V1=$(curl -sS -o /tmp/openai_chat_v1_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -X POST "$BASE_URL/chat/completions" \
            -d "$CHAT_BODY")
          echo "[diag] POST $BASE_URL/chat/completions -> HTTP $CHAT_CODE_V1"
          echo "[diag] chat(v1) response preview:"
          head -c 280 /tmp/openai_chat_v1_resp.txt || true
          echo

          CHAT_CODE_NO_V1=$(curl -sS -o /tmp/openai_chat_no_v1_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -X POST "$ALT_BASE_URL/chat/completions" \
            -d "$CHAT_BODY")
          echo "[diag] POST $ALT_BASE_URL/chat/completions -> HTTP $CHAT_CODE_NO_V1"
          echo "[diag] chat(no-v1) response preview:"
          head -c 280 /tmp/openai_chat_no_v1_resp.txt || true
          echo

      - name: Generate Codex review markdown
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error
          from urllib.parse import urlparse

          marker = '<!-- codex-review-bot -->'

          api_key = os.getenv('OPENAI_API_KEY', '').strip()
          model = os.getenv('OPENAI_REVIEW_MODEL', '').strip() or 'gpt-4.1-mini'
          base_url = os.getenv('OPENAI_BASE_URL', '').strip() or 'https://api.openai.com/v1'

          if not api_key:
              with open('review.md', 'w', encoding='utf-8') as f:
                  f.write(
                      marker + '\n' +
                      '## 🤖 Codex 自动审查\n\n' +
                      '⚠️ 跳过执行：未配置仓库 Secret `OPENAI_API_KEY`。\n'
                  )
              raise SystemExit(0)

          try:
              with open('pr-trimmed.diff', 'r', encoding='utf-8') as f:
                  diff = f.read()
          except FileNotFoundError:
              diff = ''

          prompt = (
              '你是严格的代码审查机器人，请基于下面的 PR diff 输出中文审查意见。\n\n'
              '输出格式要求：\n'
              '1) 先给“总体结论”（一句话）\n'
              '2) 按严重级别分组：阻断问题 / 建议优化 / 可选改进\n'
              '3) 每条必须包含：文件路径 + 风险说明 + 建议改法\n'
              '4) 如果未发现问题，明确写“未发现阻断问题”，并给 1-3 条质量提升建议\n'
              '5) 不要输出与 diff 无关的内容\n\n'
              'PR DIFF:\n' + diff
          )

          parsed = urlparse(base_url)
          base = base_url.rstrip('/')
          responses_endpoint = base + '/responses'
          chat_endpoint = base + '/chat/completions'

          print(f"[diag] model={model}")
          print(f"[diag] base_url_host={parsed.netloc}, base_url_path={parsed.path}")
          print(f"[diag] responses_endpoint={responses_endpoint}")
          print(f"[diag] chat_endpoint={chat_endpoint}")
          print(f"[diag] diff_size={len(diff)}")

          headers = {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
              'User-Agent': 'github-actions-codex-review/1.0',
              'Authorization': f'Bearer {api_key}',
          }

          responses_payload = {
              'model': model,
              'temperature': 0.1,
              'input': [
                  {'role': 'system', 'content': '你是资深代码审查工程师。'},
                  {'role': 'user', 'content': prompt},
              ],
              'text': {
                  'format': {
                      'type': 'text',
                  }
              },
          }

          chat_payload = {
              'model': model,
              'temperature': 0.1,
              'messages': [
                  {'role': 'system', 'content': '你是资深代码审查工程师。'},
                  {'role': 'user', 'content': prompt},
              ],
              'response_format': {
                  'type': 'text',
              },
          }

          def coerce_text(value):
              if isinstance(value, str) and value.strip():
                  return value.strip()
              if isinstance(value, list):
                  parts = []
                  for item in value:
                      if isinstance(item, str) and item.strip():
                          parts.append(item.strip())
                      elif isinstance(item, dict):
                          text = item.get('text')
                          if isinstance(text, str) and text.strip():
                              parts.append(text.strip())
                          summary_text = item.get('summary_text')
                          if isinstance(summary_text, str) and summary_text.strip():
                              parts.append(summary_text.strip())
                  if parts:
                      return '\n'.join(parts)
              if isinstance(value, dict):
                  for k in ('text', 'value', 'content', 'summary', 'summary_text'):
                      v = value.get(k)
                      t = coerce_text(v)
                      if t:
                          return t
              return ''

          def extract_text_from_chat(data):
              choices = data.get('choices') or []
              first_choice = choices[0] if isinstance(choices, list) and choices else {}
              message = first_choice.get('message') if isinstance(first_choice, dict) else {}
              message = message if isinstance(message, dict) else {}

              msg_content = coerce_text(message.get('content'))
              if msg_content:
                  return msg_content

              reasoning = coerce_text(message.get('reasoning_content'))
              if reasoning:
                  return reasoning

              reasoning_obj = message.get('reasoning')
              reasoning_summary = coerce_text(reasoning_obj)
              if reasoning_summary:
                  return reasoning_summary

              return ''

          def extract_text_from_responses(data):
              output_text = coerce_text(data.get('output_text'))
              if output_text:
                  return output_text

              text_field = coerce_text(data.get('text'))
              if text_field:
                  return text_field

              reasoning_summary = coerce_text(data.get('reasoning'))
              if reasoning_summary:
                  return reasoning_summary

              output = data.get('output')
              if isinstance(output, list):
                  parts = []
                  for item in output:
                      if not isinstance(item, dict):
                          continue
                      content_items = item.get('content')
                      if isinstance(content_items, list):
                          for c in content_items:
                              if not isinstance(c, dict):
                                  continue
                              text = coerce_text(c.get('text'))
                              if text:
                                  parts.append(text)
                      direct_text = coerce_text(item)
                      if direct_text:
                          parts.append(direct_text)
                  if parts:
                      return '\n'.join(parts)

              return ''

          content = ''
          diag_errors = []

          # 1) 优先走 responses
          try:
              req = urllib.request.Request(
                  responses_endpoint,
                  data=json.dumps(responses_payload).encode('utf-8'),
                  headers=headers,
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  raw_text = resp.read().decode('utf-8', errors='ignore')
                  data = json.loads(raw_text)
                  content = extract_text_from_responses(data)
                  if not content:
                      print(f"[diag] responses_status={data.get('status')}")
                      print(f"[diag] responses_keys={list(data.keys())}")
                      usage = data.get('usage')
                      if isinstance(usage, dict):
                          print(f"[diag] responses_usage={usage}")
                      print(f"[diag] responses_text_field={str(data.get('text'))[:600]}")
                      print(f"[diag] responses_reasoning_field={str(data.get('reasoning'))[:600]}")
                      print(f"[diag] responses_incomplete_details={str(data.get('incomplete_details'))[:600]}")
                      print(f"[diag] responses_preview={raw_text[:600]}")
          except urllib.error.HTTPError as e:
              detail = e.read().decode('utf-8', errors='ignore')
              diag_errors.append(f'responses HTTP {e.code}: {detail[:240]}')
              print(f"[diag] responses HTTPError status={e.code}")
              print(f"[diag] responses HTTPError body={detail[:600]}")
          except Exception as e:
              diag_errors.append(f'responses Exception: {e}')
              print(f"[diag] responses Exception={e}")

          # 2) responses 无文本时，回退 chat/completions
          if not content:
              try:
                  req = urllib.request.Request(
                      chat_endpoint,
                      data=json.dumps(chat_payload).encode('utf-8'),
                      headers=headers,
                      method='POST',
                  )
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      raw_text = resp.read().decode('utf-8', errors='ignore')
                      data = json.loads(raw_text)
                      content = extract_text_from_chat(data)
                      if not content:
                          first_choice = ((data.get('choices') or [{}])[0] or {})
                          message = first_choice.get('message') if isinstance(first_choice, dict) else {}
                          message = message if isinstance(message, dict) else {}
                          print(f"[diag] chat_finish_reason={first_choice.get('finish_reason') if isinstance(first_choice, dict) else None}")
                          print(f"[diag] chat_keys={list(data.keys())}")
                          print(f"[diag] chat_message_keys={list(message.keys())}")
                          print(f"[diag] chat_reasoning_field={str(message.get('reasoning'))[:600]}")
                          print(f"[diag] chat_reasoning_content_field={str(message.get('reasoning_content'))[:600]}")
                          usage = data.get('usage')
                          if isinstance(usage, dict):
                              print(f"[diag] chat_usage={usage}")
                          print(f"[diag] chat_preview={raw_text[:600]}")
              except urllib.error.HTTPError as e:
                  detail = e.read().decode('utf-8', errors='ignore')
                  diag_errors.append(f'chat HTTP {e.code}: {detail[:240]}')
                  print(f"[diag] chat HTTPError status={e.code}")
                  print(f"[diag] chat HTTPError body={detail[:600]}")
              except Exception as e:
                  diag_errors.append(f'chat Exception: {e}')
                  print(f"[diag] chat Exception={e}")

          if not content and diag_errors:
              content = '审查失败：' + ' | '.join(diag_errors)

          if not content:
              content = '审查接口返回成功，但未返回可解析文本。'

          with open('review.md', 'w', encoding='utf-8') as f:
              f.write(
                  marker + '\n' +
                  '## 🤖 Codex 自动审查\n\n' +
                  content + '\n\n' +
                  '> 说明：本评论由 GitHub Actions 自动生成。\n'
              )
          PY

      - name: Upsert PR review comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY_PATH: review.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const body = fs.readFileSync(process.env.REVIEW_BODY_PATH, 'utf8')
            const marker = '<!-- codex-review-bot -->'
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const botComment = comments.find((c) =>
              c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker),
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

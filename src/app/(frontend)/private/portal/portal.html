<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aletheia - Digital Sovereignty Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }

    @keyframes float-0 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(10px, -10px); }
      50% { transform: translate(-5px, -20px); }
      75% { transform: translate(-10px, -10px); }
    }

    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-10px, 10px); }
      50% { transform: translate(5px, 20px); }
      75% { transform: translate(10px, 10px); }
    }

    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(15px, -15px); }
      66% { transform: translate(-15px, 15px); }
    }

    @keyframes global-raindrop {
      0% { transform: translateY(0) scaleY(1); opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 1; }
      100% { transform: translateY(120vh) scaleY(1.8); opacity: 0; }
    }

    @keyframes letter-appear {
      0% { opacity: 0; transform: translateY(-20px) rotateX(90deg); }
      100% { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes card-appear {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }

    @keyframes spin {
      from { transform: translateY(-50%) rotate(0deg); }
      to { transform: translateY(-50%) rotate(360deg); }
    }

    @keyframes scan {
      0% { top: -100%; }
      50% { top: 100%; }
      100% { top: 100%; }
    }

    @keyframes flow-border {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes ripple-effect {
      0% { width: 20px; height: 20px; opacity: 0.5; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    .service-card:hover .corner-dot {
      opacity: 1 !important;
    }

    .service-card:hover .border-glow {
      opacity: 1 !important;
      animation: border-flow 2s linear infinite;
    }

    .service-card:hover .scan-line {
      opacity: 1 !important;
      animation: scan 1.5s ease-in-out infinite;
    }

    .scroll-top-btn:hover {
      transform: translateY(-4px) scale(1.05) !important;
    }

    .control-btn:active, .category-btn:active {
      transform: scale(0.95) !important;
    }

    @media (max-width: 768px) {
      .title-decoration { display: none !important; }
      h1 { font-size: 2.5rem !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    const { useState, useMemo, useEffect, useRef, createElement: h } = React;

    const SERVICES = [
      { name: "LobeChat", desc: "AI 对话平台", category: "核心应用", internal: "http://192.168.1.103:3210", external: "https://ai.amireux.chat" },
      { name: "OpenClaw", desc: "AI 自动化工作台", category: "核心应用", internal: "http://192.168.1.103:18789", external: "https://oc.amireux.chat" },
      { name: "Dify", desc: "LLM 应用编排平台", category: "核心应用", external: "https://dify.amireux.chat" },
      { name: "Wiki.js", desc: "知识库系统", category: "核心应用", internal: "http://192.168.1.103:3005", external: "https://wiki.amireux.chat" },
      { name: "Immich", desc: "照片管理系统", category: "核心应用", internal: "http://192.168.1.103:2283", external: "https://p.amireux.chat" },
      { name: "Jellyfin", desc: "媒体服务器", category: "核心应用", internal: "http://192.168.1.103:8096", external: "https://media.amireux.chat" },
      { name: "Home Assistant", desc: "智能家居控制", category: "核心应用", internal: "http://192.168.1.103:8123", external: "https://ha.amireux.chat" },
      { name: "CLIProxyAPI", desc: "CLI 多模型代理服务", category: "API 与代理", internal: "http://192.168.1.103:3011/management.html", external: "https://clip.amireux.chat/management.html" },
      { name: "EasyProxies", desc: "多端口代理池管理", category: "API 与代理", internal: "http://192.168.1.103:9888", external: "https://proxy.amireux.chat" },
      { name: "GOT-OCR", desc: "高精度 OCR 识别服务", category: "API 与代理", internal: "http://192.168.1.103:8866" },
      { name: "OutlookMail Plus", desc: "邮箱接码 / 验证码提取", category: "API 与代理", internal: "http://192.168.1.103:5002" },
      { name: "Dockge", desc: "Docker Compose 管理面板", category: "基础设施", internal: "http://192.168.1.103:5001", external: "https://dockge.amireux.chat" },
      { name: "Traefik", desc: "反向代理 Dashboard", category: "基础设施", internal: "http://192.168.1.103:8080", external: "https://traefik.amireux.chat" },
      { name: "Aria2 / AriaNg", desc: "下载工具", category: "基础设施", internal: "http://192.168.1.103:6880", external: "https://aria.amireux.chat" },
      { name: "CasaOS", desc: "NAS 管理面板", category: "基础设施", internal: "http://192.168.1.103:8580" },
      { name: "Telegram Downloader", desc: "Telegram 媒体下载", category: "基础设施", internal: "http://192.168.1.103:5000" },
      { name: "Glances", desc: "系统监控", category: "基础设施", internal: "http://192.168.1.103:61208" },
      { name: "MCP Wiki", desc: "Wiki 操作工具", category: "MCP 工具", internal: "http://192.168.1.103:3001" },
      { name: "MCP Wiki Incremental", desc: "Wiki 增量更新", category: "MCP 工具", internal: "http://192.168.1.103:3007" },
      { name: "MCP Search", desc: "搜索服务", category: "MCP 工具", internal: "http://192.168.1.103:3002" },
      { name: "MCP D2", desc: "D2 图表生成", category: "MCP 工具", internal: "http://192.168.1.103:3003" },
      { name: "MCP Mermaid", desc: "Mermaid 图表", category: "MCP 工具", internal: "http://192.168.1.103:3006" },
      { name: "MCP Media", desc: "媒体服务", category: "MCP 工具", internal: "http://192.168.1.103:3004" },
      { name: "NapCat", desc: "QQ 机器人", category: "QQ Bot", internal: "http://192.168.1.103:6099" },
      { name: "NapCat Exporter", desc: "聊天记录导出 + QCE", category: "QQ Bot", internal: "http://192.168.1.103:6098", external: "http://192.168.1.103:40654/qce-v4-tool" }
    ];

    const CATEGORIES = ["核心应用", "API 与代理", "基础设施", "MCP 工具", "QQ Bot"];

    const CATEGORY_COLORS = {
      "核心应用": { color: "#bb9af7", glow: "rgba(187, 154, 247, 0.3)" },
      "API 与代理": { color: "#7dcfff", glow: "rgba(125, 207, 255, 0.3)" },
      "基础设施": { color: "#9ece6a", glow: "rgba(158, 206, 106, 0.3)" },
      "MCP 工具": { color: "#ff9e64", glow: "rgba(255, 158, 100, 0.3)" },
      "QQ Bot": { color: "#f7768e", glow: "rgba(247, 118, 142, 0.3)" }
    };

    const THEMES = {
      storm: {
        name: "Storm", bg1: "rgba(26, 27, 38, 0.3)", bg2: "rgba(36, 40, 59, 0.4)",
        primary: "#7aa2f7", secondary: "#7dcfff", accent: "#bb9af7",
        text: "#c0caf5", textDim: "#9aa5ce", glow: "rgba(125, 207, 255, 0.2)",
        titleColor: "#c0caf5", icon: "moon"
      },
      night: {
        name: "Night", bg1: "rgba(16, 16, 30, 0.3)", bg2: "rgba(26, 27, 38, 0.4)",
        primary: "#a9b1d6", secondary: "#7aa2f7", accent: "#bb9af7",
        text: "#a9b1d6", textDim: "#787c99", glow: "rgba(169, 177, 214, 0.2)",
        titleColor: "#a9b1d6", icon: "cloud"
      },
      day: {
        name: "Day", bg1: "rgba(213, 214, 219, 0.2)", bg2: "rgba(227, 228, 234, 0.3)",
        primary: "#3760bf", secondary: "#188092", accent: "#7847bd",
        text: "#343b58", textDim: "#565a6e", glow: "rgba(55, 96, 191, 0.15)",
        titleColor: "#343b58", icon: "sun"
      }
    };

    function Icon({ name, size = 24, style = {} }) {
      return h('i', { 'data-lucide': name, style: { width: size, height: size, ...style } });
    }

    function App() {
      const [search, setSearch] = useState("");
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [expandedCategories, setExpandedCategories] = useState(new Set(CATEGORIES));
      const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
      const [scrollProgress, setScrollProgress] = useState(0);
      const [theme, setTheme] = useState("storm");
      const [viewMode, setViewMode] = useState("grid");
      const [rainEnabled, setRainEnabled] = useState(true);
      const [showScrollTop, setShowScrollTop] = useState(false);
      const [mounted, setMounted] = useState(false);

      const currentTheme = THEMES[theme];

      useEffect(() => {
        setMounted(true);
        if (window.lucide) lucide.createIcons();
      }, []);

      useEffect(() => {
        if (window.lucide) lucide.createIcons();
      });

      useEffect(() => {
        const handleMouseMove = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
        const handleScroll = () => {
          const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
          const scrolled = window.scrollY;
          const progress = scrollHeight > 0 ? (scrolled / scrollHeight) * 100 : 0;
          setScrollProgress(progress);
          setShowScrollTop(scrolled > 300);
        };

        window.addEventListener("mousemove", handleMouseMove);
        window.addEventListener("scroll", handleScroll);
        return () => {
          window.removeEventListener("mousemove", handleMouseMove);
          window.removeEventListener("scroll", handleScroll);
        };
      }, []);

      const filteredServices = useMemo(() => {
        return SERVICES.filter((service) => {
          const matchesSearch = search.toLowerCase() === "" ||
            service.name.toLowerCase().includes(search.toLowerCase()) ||
            service.desc.toLowerCase().includes(search.toLowerCase());
          const matchesCategory = !selectedCategory || service.category === selectedCategory;
          return matchesSearch && matchesCategory;
        });
      }, [search, selectedCategory]);

      const groupedServices = useMemo(() => {
        const grouped = {};
        filteredServices.forEach((service) => {
          if (!grouped[service.category]) grouped[service.category] = [];
          grouped[service.category].push(service);
        });
        return grouped;
      }, [filteredServices]);

      const toggleCategory = (category) => {
        const newExpanded = new Set(expandedCategories);
        if (newExpanded.has(category)) {
          newExpanded.delete(category);
        } else {
          newExpanded.add(category);
        }
        setExpandedCategories(newExpanded);
      };

      const scrollToTop = () => window.scrollTo({ top: 0, behavior: "smooth" });

      const particles = useMemo(() => {
        return Array.from({ length: 50 }, (_, i) => ({
          x: Math.random() * 100,
          y: Math.random() * 100,
          size: Math.random() * 3 + 1,
          opacity: Math.random() * 0.5 + 0.3,
          anim: i % 3
        }));
      }, []);

      const raindrops = useMemo(() => {
        return Array.from({ length: 100 }, () => ({
          x: Math.random() * 100,
          y: Math.random() * -50,
          size: Math.random() * 2 + 1,
          speed: Math.random() * 1.5 + 1,
          delay: Math.random() * 5,
          opacity: Math.random() * 0.5 + 0.3,
          blur: Math.random() * 2 + 1
        }));
      }, []);

      const titleText = "Aletheia";

      return h('div', { style: { minHeight: "100vh", position: "relative", overflow: "hidden" } }, [
        h('div', {
          key: 'progress',
          style: {
            position: "fixed", top: 0, left: 0, width: `${scrollProgress}%`, height: "3px",
            background: `linear-gradient(90deg, ${currentTheme.primary}, ${currentTheme.secondary})`,
            boxShadow: `0 0 10px ${currentTheme.primary}`, zIndex: 9999, transition: "width 0.1s ease-out"
          }
        }),

        h('div', {
          key: 'bg',
          style: {
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            backgroundImage: "url(/assets/backgrounds/2.png)",
            backgroundSize: "cover", backgroundPosition: "center", backgroundRepeat: "no-repeat",
            filter: theme === "day" ? "brightness(0.9) saturate(1.2)" : "brightness(0.65) saturate(1.1) hue-rotate(5deg)",
            zIndex: -2
          }
        }),

        h('div', {
          key: 'overlay',
          style: {
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: `linear-gradient(135deg, ${currentTheme.bg1} 0%, ${currentTheme.bg2} 100%)`,
            zIndex: -1
          }
        }),

        h('div', {
          key: 'particles',
          style: {
            position: "fixed", top: 0, left: 0, width: "100%", height: "100%",
            pointerEvents: "none", zIndex: 0, overflow: "hidden"
          }
        }, particles.map((p, i) =>
          h('div', {
            key: `p${i}`,
            style: {
              position: "absolute", left: `${p.x}%`, top: `${p.y}%`,
              width: `${p.size}px`, height: `${p.size}px`, borderRadius: "50%",
              background: currentTheme.primary, opacity: p.opacity,
              boxShadow: `0 0 ${p.size * 2}px ${currentTheme.primary}`,
              animation: `float-${p.anim} ${15 + Math.random() * 10}s ease-in-out infinite`
            }
          })
        )),

        rainEnabled && h('div', {
          key: 'rain',
          style: {
            position: "fixed", top: 0, left: 0, width: "100%", height: "100%",
            pointerEvents: "none", zIndex: 0, overflow: "hidden"
          }
        }, raindrops.map((drop, i) =>
          h('div', {
            key: `r${i}`,
            style: {
              position: "absolute", left: `${drop.x}%`, top: `${drop.y}%`,
              width: `${drop.size}px`, height: `${drop.size * 4}px`, borderRadius: "50%",
              background: `linear-gradient(180deg, ${currentTheme.primary}${Math.floor(drop.opacity * 100)}, ${currentTheme.secondary}40)`,
              filter: `blur(${drop.blur}px)`,
              animation: `global-raindrop ${5 / drop.speed}s linear ${drop.delay}s infinite`,
              opacity: drop.opacity,
              boxShadow: `0 0 ${drop.size * 2}px ${currentTheme.primary}${Math.floor(drop.opacity * 50)}`
            }
          })
        )),

        h('div', {
          key: 'glow',
          style: {
            position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0,
            background: `radial-gradient(600px circle at ${mousePosition.x}px ${mousePosition.y}px, ${currentTheme.glow}, transparent 40%)`,
            transition: "background 0.05s ease-out"
          }
        }),

        showScrollTop && h('button', {
          key: 'st',
          onClick: scrollToTop,
          style: {
            position: "fixed", bottom: "2rem", right: "2rem", padding: "1rem",
            background: `linear-gradient(135deg, ${currentTheme.primary}, ${currentTheme.secondary})`,
            border: "none", borderRadius: "50%", color: "#1a1b26", cursor: "pointer",
            boxShadow: `0 0 20px ${currentTheme.primary}80`, zIndex: 1000, transition: "all 0.3s",
            display: "flex", alignItems: "center", justifyContent: "center"
          }
        }, h(Icon, { name: 'arrow-up', size: 24 })),

        h('div', { key: 'content', style: { padding: "2rem", position: "relative", zIndex: 1 } },
          h('div', { style: { maxWidth: "1400px", margin: "0 auto" } }, [
            h('div', {
              key: 'hdr',
              style: {
                textAlign: "center", marginBottom: "3rem", paddingBottom: "2rem",
                borderBottom: `1px solid ${currentTheme.primary}33`
              }
            }, [
              h('div', {
                key: 'ctrl',
                style: {
                  display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                  marginBottom: "1rem", flexWrap: "wrap", gap: "1rem"
                }
              }, [
                h('div', {
                  key: 'clk',
                  style: {
                    fontSize: "0.85rem", color: currentTheme.textDim, display: "flex", gap: "1rem",
                    alignItems: "center", textShadow: `0 0 10px ${currentTheme.glow}`
                  }
                }, new Date().toLocaleTimeString("zh-CN")),

                h('div', { key: 'btns', style: { display: "flex", gap: "0.5rem", flexWrap: "wrap" } }, [
                  h('button', {
                    key: 'rain',
                    onClick: () => setRainEnabled(!rainEnabled),
                    style: {
                      padding: "0.5rem",
                      background: rainEnabled ? `linear-gradient(135deg, ${currentTheme.primary}, ${currentTheme.secondary})` : currentTheme.bg1,
                      border: `1px solid ${rainEnabled ? currentTheme.secondary : currentTheme.primary}40`,
                      borderRadius: "0.5rem", color: rainEnabled ? "#1a1b26" : currentTheme.primary,
                      cursor: "pointer", transition: "all 0.2s", backdropFilter: "blur(10px)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      boxShadow: rainEnabled ? `0 0 15px ${currentTheme.primary}66` : "none"
                    }
                  }, h(Icon, { name: 'cloud-rain', size: 16 })),

                  ...Object.keys(THEMES).map(tk =>
                    h('button', {
                      key: `theme${tk}`,
                      onClick: () => setTheme(tk),
                      style: {
                        padding: "0.5rem",
                        background: theme === tk
                          ? `linear-gradient(135deg, ${THEMES[tk].primary}, ${THEMES[tk].secondary})`
                          : THEMES[tk].bg1,
                        border: `1px solid ${theme === tk ? THEMES[tk].secondary : THEMES[tk].primary}40`,
                        borderRadius: "0.5rem", color: theme === tk ? "#1a1b26" : THEMES[tk].primary,
                        cursor: "pointer", transition: "all 0.2s", backdropFilter: "blur(10px)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        boxShadow: theme === tk ? `0 0 15px ${THEMES[tk].primary}66` : "none"
                      }
                    }, h(Icon, { name: THEMES[tk].icon, size: 16 }))
                  ),

                  h('button', {
                    key: 'view',
                    onClick: () => setViewMode(viewMode === "grid" ? "list" : "grid"),
                    style: {
                      padding: "0.5rem", background: currentTheme.bg1,
                      border: `1px solid ${currentTheme.primary}40`, borderRadius: "0.5rem",
                      color: currentTheme.primary, cursor: "pointer", transition: "all 0.2s",
                      backdropFilter: "blur(10px)", display: "flex", alignItems: "center", justifyContent: "center"
                    }
                  }, h(Icon, { name: viewMode === "grid" ? 'list' : 'grid-3x3', size: 16 }))
                ])
              ]),

              h('div', { key: 'title-wrapper', style: { position: "relative", display: "inline-block" } }, [
                h('div', {
                  key: 'tdl',
                  className: 'title-decoration',
                  style: {
                    position: "absolute", left: "-120px", top: "50%", transform: "translateY(-50%)",
                    width: "100px", height: "2px",
                    background: `linear-gradient(90deg, transparent, ${currentTheme.primary})`,
                    boxShadow: `0 0 10px ${currentTheme.primary}`
                  }
                }, h('div', {
                  style: {
                    position: "absolute", right: 0, top: "-3px", width: "8px", height: "8px",
                    borderRadius: "50%", background: currentTheme.primary,
                    boxShadow: `0 0 10px ${currentTheme.primary}`,
                    animation: "pulse-dot 2s ease-in-out infinite"
                  }
                })),

                h('h1', {
                  key: 'title',
                  style: {
                    fontSize: "3.5rem", fontWeight: 900, color: currentTheme.titleColor,
                    marginBottom: "0.5rem",
                    textShadow: `0 0 40px ${currentTheme.primary}80, 0 0 80px ${currentTheme.secondary}60`,
                    filter: `drop-shadow(0 0 20px ${currentTheme.secondary}80)`,
                    letterSpacing: "0.1em"
                  }
                }, titleText.split("").map((char, i) =>
                  h('span', {
                    key: i,
                    className: 'title-char',
                    style: {
                      display: "inline-block",
                      animation: mounted ? `letter-appear 0.5s ease-out ${i * 0.1}s both` : "none"
                    }
                  }, char)
                )),

                h('div', {
                  key: 'tdr',
                  className: 'title-decoration',
                  style: {
                    position: "absolute", right: "-120px", top: "50%", transform: "translateY(-50%)",
                    width: "100px", height: "2px",
                    background: `linear-gradient(90deg, ${currentTheme.primary}, transparent)`,
                    boxShadow: `0 0 10px ${currentTheme.primary}`
                  }
                }, h('div', {
                  style: {
                    position: "absolute", left: 0, top: "-3px", width: "8px", height: "8px",
                    borderRadius: "50%", background: currentTheme.primary,
                    boxShadow: `0 0 10px ${currentTheme.primary}`,
                    animation: "pulse-dot 2s ease-in-out infinite 0.5s"
                  }
                }))
              ]),

              h('p', {
                key: 'subtitle',
                style: {
                  color: currentTheme.primary, fontSize: "0.9rem", letterSpacing: "0.15em",
                  textShadow: `0 0 10px ${currentTheme.primary}80`,
                  animation: mounted ? "fade-in 1s ease-out 0.8s both" : "none"
                }
              }, "DIGITAL SOVEREIGNTY PORTAL · 192.168.1.103")
            ]),

            h('div', {
              key: 'search',
              style: {
                marginBottom: "2rem", display: "flex", flexDirection: "column", gap: "1rem",
                animation: mounted ? "slide-up 0.6s ease-out 1s both" : "none"
              }
            }, [
              h('div', { key: 'si', style: { position: "relative" } }, [
                h(Icon, {
                  key: 'sic',
                  name: 'search',
                  size: 20,
                  style: {
                    position: "absolute", left: "1rem", top: "50%", transform: "translateY(-50%)",
                    color: currentTheme.primary, filter: `drop-shadow(0 0 4px ${currentTheme.primary}99)`
                  }
                }),
                h('input', {
                  key: 'sinput',
                  type: "text",
                  placeholder: "搜索服务...",
                  value: search,
                  onChange: (e) => setSearch(e.target.value),
                  style: {
                    width: "100%", padding: "0.75rem 1rem 0.75rem 2.5rem",
                    background: currentTheme.bg1, border: `1px solid ${currentTheme.primary}40`,
                    borderRadius: "0.75rem", color: currentTheme.text, fontSize: "1rem",
                    backdropFilter: "blur(15px)", outline: "none", transition: "all 0.3s",
                    boxShadow: "0 4px 20px rgba(0, 0, 0, 0.2)"
                  }
                })
              ]),

              h('div', { key: 'cats', style: { display: "flex", gap: "0.5rem", flexWrap: "wrap" } }, [
                h('button', {
                  key: 'catall',
                  onClick: () => setSelectedCategory(null),
                  className: 'category-btn',
                  style: {
                    padding: "0.5rem 1rem",
                    background: !selectedCategory
                      ? `linear-gradient(135deg, ${currentTheme.primary}, ${currentTheme.secondary})`
                      : currentTheme.bg1,
                    border: `1px solid ${!selectedCategory ? currentTheme.secondary : currentTheme.primary}40`,
                    borderRadius: "0.5rem", color: !selectedCategory ? "#1a1b26" : currentTheme.primary,
                    cursor: "pointer", fontSize: "0.85rem", fontWeight: 600, transition: "all 0.2s",
                    backdropFilter: "blur(10px)",
                    boxShadow: !selectedCategory ? `0 0 20px ${currentTheme.primary}80` : "none"
                  }
                }, "全部"),

                ...CATEGORIES.map(cat => {
                  const cc = CATEGORY_COLORS[cat];
                  return h('button', {
                    key: `cat${cat}`,
                    onClick: () => setSelectedCategory(selectedCategory === cat ? null : cat),
                    className: 'category-btn',
                    style: {
                      padding: "0.5rem 1rem",
                      background: selectedCategory === cat
                        ? `linear-gradient(135deg, ${cc.color}, ${currentTheme.secondary})`
                        : currentTheme.bg1,
                      border: `1px solid ${selectedCategory === cat ? cc.color : currentTheme.primary}40`,
                      borderRadius: "0.5rem",
                      color: selectedCategory === cat ? "#1a1b26" : currentTheme.primary,
                      cursor: "pointer", fontSize: "0.85rem", fontWeight: 600, transition: "all 0.2s",
                      backdropFilter: "blur(10px)",
                      boxShadow: selectedCategory === cat ? `0 0 20px ${cc.glow}` : "none"
                    }
                  }, cat);
                })
              ])
            ]),

            h('div', { key: 'svcs', style: { display: "flex", flexDirection: "column", gap: "2rem" } },
              CATEGORIES.map((category, catIndex) => {
                if (!groupedServices[category]) return null;
                const isExpanded = expandedCategories.has(category);
                const cc = CATEGORY_COLORS[category];

                return h('div', {
                  key: category,
                  style: {
                    animation: mounted ? `slide-up 0.6s ease-out ${1.2 + catIndex * 0.1}s both` : "none"
                  }
                }, [
                  h('button', {
                    key: 'chdr',
                    onClick: () => toggleCategory(category),
                    style: {
                      display: "flex", alignItems: "center", gap: "0.5rem", width: "100%", padding: "1rem",
                      background: currentTheme.bg1, border: `1px solid ${cc.color}40`,
                      borderRadius: "0.75rem", color: cc.color, cursor: "pointer",
                      fontSize: "1.1rem", fontWeight: 700, transition: "all 0.3s", marginBottom: "1rem",
                      backdropFilter: "blur(15px)", boxShadow: "0 4px 20px rgba(0, 0, 0, 0.2)"
                    }
                  }, [
                    h(Icon, {
                      key: 'chv',
                      name: 'chevron-down',
                      size: 20,
                      style: {
                        transform: isExpanded ? "rotate(0deg)" : "rotate(-90deg)",
                        transition: "transform 0.2s", filter: `drop-shadow(0 0 4px ${cc.color})`
                      }
                    }),
                    h('span', { key: 'cname' }, category),
                    h('span', {
                      key: 'ccnt',
                      style: { marginLeft: "auto", color: currentTheme.textDim, fontSize: "0.9rem" }
                    }, `(${groupedServices[category].length})`)
                  ]),

                  isExpanded && h('div', {
                    key: 'sgrid',
                    style: {
                      display: viewMode === "grid" ? "grid" : "flex",
                      gridTemplateColumns: viewMode === "grid" ? "repeat(auto-fill, minmax(280px, 1fr))" : "1fr",
                      flexDirection: viewMode === "list" ? "column" : "row",
                      gap: "1rem", marginBottom: "1rem"
                    }
                  }, groupedServices[category].map((service, serviceIndex) =>
                    h('div', {
                      key: service.name,
                      className: 'service-card',
                      style: {
                        position: "relative", overflow: "hidden", background: currentTheme.bg1,
                        backdropFilter: "blur(15px)", border: `1px solid ${cc.color}26`,
                        borderRadius: "1rem", padding: viewMode === "list" ? "1rem" : "1.5rem",
                        transition: "all 0.3s", cursor: "pointer", boxShadow: "0 4px 20px rgba(0, 0, 0, 0.2)",
                        display: viewMode === "list" ? "flex" : "block",
                        alignItems: viewMode === "list" ? "center" : "stretch",
                        gap: viewMode === "list" ? "1rem" : "0",
                        animation: `card-appear 0.4s ease-out ${serviceIndex * 0.05}s both`
                      }
                    }, [
                      ...['tl', 'tr', 'bl', 'br'].map(pos => {
                        const pp = {
                          tl: { top: "8px", left: "8px" },
                          tr: { top: "8px", right: "8px" },
                          bl: { bottom: "8px", left: "8px" },
                          br: { bottom: "8px", right: "8px" }
                        };
                        return h('div', {
                          key: `dot${pos}`,
                          className: 'corner-dot',
                          style: {
                            position: "absolute", ...pp[pos],
                            width: "4px", height: "4px", borderRadius: "50%",
                            background: cc.color, boxShadow: `0 0 8px ${cc.color}`,
                            opacity: 0, transition: "opacity 0.3s"
                          }
                        });
                      }),

                      h('div', {
                        key: 'bglow',
                        className: 'border-glow',
                        style: {
                          position: "absolute", top: 0, left: "-100%", width: "100%", height: "100%",
                          background: `linear-gradient(90deg, transparent, ${cc.color}66, transparent)`,
                          opacity: 0, transition: "opacity 0.3s"
                        }
                      }),

                      h('div', {
                        key: 'scan',
                        className: 'scan-line',
                        style: {
                          position: "absolute", top: "-100%", left: 0, width: "100%", height: "2px",
                          background: `linear-gradient(90deg, transparent, ${currentTheme.secondary}, transparent)`,
                          boxShadow: `0 0 10px ${currentTheme.secondary}`, opacity: 0, transition: "opacity 0.3s"
                        }
                      }),

                      h('div', { key: 'cont', style: { position: "relative", zIndex: 1 } }, [
                        h('h3', {
                          key: 'name',
                          style: {
                            fontSize: "1.1rem", fontWeight: 700,
                            marginBottom: viewMode === "list" ? "0" : "0.5rem",
                            color: currentTheme.text, textShadow: `0 0 10px ${currentTheme.text}50`
                          }
                        }, service.name),

                        viewMode === "grid" && h('p', {
                          key: 'desc',
                          style: {
                            fontSize: "0.85rem", color: currentTheme.textDim,
                            marginBottom: "1rem", lineHeight: "1.6"
                          }
                        }, service.desc)
                      ]),

                      viewMode === "list" && h('p', {
                        key: 'descl',
                        style: {
                          fontSize: "0.85rem", color: currentTheme.textDim,
                          flex: "2", position: "relative", zIndex: 1, lineHeight: "1.6"
                        }
                      }, service.desc),

                      h('div', {
                        key: 'links',
                        style: {
                          display: "flex", gap: "0.5rem", flexWrap: "wrap",
                          position: "relative", zIndex: 1
                        }
                      }, [
                        service.internal && h('a', {
                          key: 'int',
                          href: service.internal,
                          target: "_blank",
                          rel: "noopener noreferrer",
                          style: {
                            flex: viewMode === "list" ? "0 0 auto" : 1,
                            minWidth: "80px", padding: "0.6rem 1rem", borderRadius: "0.5rem",
                            textDecoration: "none", textAlign: "center", fontSize: "0.85rem",
                            fontWeight: 600, background: currentTheme.bg2, color: currentTheme.primary,
                            border: `1px solid ${currentTheme.primary}40`, transition: "all 0.2s",
                            cursor: "pointer"
                          }
                        }, "内网"),

                        service.external && h('a', {
                          key: 'ext',
                          href: service.external,
                          target: "_blank",
                          rel: "noopener noreferrer",
                          style: {
                            flex: viewMode === "list" ? "0 0 auto" : 1,
                            minWidth: "80px", padding: "0.6rem 1rem", borderRadius: "0.5rem",
                            textDecoration: "none", textAlign: "center", fontSize: "0.85rem",
                            fontWeight: 600,
                            background: `linear-gradient(135deg, ${currentTheme.primary}, ${currentTheme.secondary})`,
                            color: theme === "day" ? "#ffffff" : "#1a1b26",
                            border: "none", transition: "all 0.2s", cursor: "pointer",
                            boxShadow: `0 0 20px ${currentTheme.primary}66`
                          }
                        }, "外网")
                      ])
                    ])
                  ))
                ]);
              })
            ),

            filteredServices.length === 0 && h('div', {
              key: 'empty',
              style: {
                textAlign: "center", padding: "4rem 1rem", color: currentTheme.textDim,
                animation: "fade-in 0.6s ease-out"
              }
            }, [
              h(Icon, {
                key: 'icon',
                name: 'sparkles',
                size: 48,
                style: {
                  color: currentTheme.primary, marginBottom: "1rem",
                  filter: `drop-shadow(0 0 10px ${currentTheme.primary})`
                }
              }),
              h('p', { key: 'msg1', style: { fontSize: "1.3rem", marginBottom: "0.5rem", fontWeight: 600 } },
                "未找到匹配的服务"),
              h('p', { key: 'msg2', style: { fontSize: "0.95rem", marginTop: "0.5rem", opacity: 0.8 } },
                "尝试调整搜索关键词或选择不同的分类")
            ])
          ])
        )
      ]);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
